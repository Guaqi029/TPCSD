defaults:
  dataset: ISIC2019LT
  image_size: 224
  backbone: resnet50
  pretrained: true
  epochs: 200
  batch_size: 128
  num_workers: 8
  lr: 0.001
  weight_decay: 0.0001
  momentum: 0.9
  cls_loss: ce
  cls_warmup_epochs: 150
  use_class_weight: false
  pcd_weight: 1.0
  pcd_temp: 0.05
  pcd_margin: 0.85
  spkd_weight: 10.0
  punif_weight: 1.0
  punif_t: 2.0
  punif_warmup_start_epoch: 15
  punif_warmup_end_epoch: 30
  ema_decay: 0.99
  proto_momentum: 0.96
  recal_interval: 5
  recal_alpha: 0.15
  tail_alpha: true
  queue_size: 1024
  seed: 42

paths:
  data_root_isic2019lt: /data/DataLACP/guyiqin/ISIC2019LT/ISIC_2019_Training_Input
  split_root_isic2019lt: /data/DataLACP/guyiqin/CODE/TPCSD/split/ISIC2019LT
  data_root_isic_archive: /data/DataLACP/guyiqin/ISIC_Archive
  split_root_isic_archive: /data/DataLACP/guyiqin/CODE/TPCSD/split/ISIC_Archive
  checkpoints: ./checkpoints
  logs: ./log/tpcsd

stage2:
  epochs: 100
  batch_size: 64
  stage2_batch_size: 2048
  lambda_mu: 0.5
  delta_noise: 0.01
  cov_scale_factor: 1.0
  aas_alpha: 2.0
  virtual_ratio: 1.0
  merge_real: true
  use_class_weight: false
